version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hydraskript-web
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
    depends_on:
      - redis
    networks:
      - hydra-network

  workers:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hydraskript-workers
    command: ["npm", "run", "workers"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
    depends_on:
      - redis
    networks:
      - hydra-network

  redis:
    image: redis:alpine
    container_name: hydraskript-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hydra-network

networks:
  hydra-network:
    driver: bridge

volumes:
  redis_data:
